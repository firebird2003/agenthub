<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentHub - 代理管理平台</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>🤖 AgentHub</h1>
            <nav class="nav">
                <a href="/" class="active">仪表盘</a>
                <a href="/messages.html">消息中心</a>
            </nav>
        </header>

        <main class="main">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="total-agents">0</div>
                    <div class="stat-label">代理总数</div>
                </div>
                <div class="stat-card online">
                    <div class="stat-value" id="online-agents">0</div>
                    <div class="stat-label">在线代理</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="offline-agents">0</div>
                    <div class="stat-label">离线代理</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="unread-messages">0</div>
                    <div class="stat-label">未读消息</div>
                </div>
            </div>

            <section class="section">
                <div class="section-header">
                    <h2>代理列表</h2>
                    <button class="btn btn-primary" onclick="showCreateModal()">+ 新建代理</button>
                </div>
                <div class="agent-grid" id="agent-list">
                    <div class="loading">加载中...</div>
                </div>
            </section>
        </main>
    </div>

    <!-- 新建代理弹窗 -->
    <div class="modal" id="create-modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>新建代理</h3>
                <button class="close" onclick="closeModal()">×</button>
            </div>
            <form class="modal-body" onsubmit="createAgent(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>代理 ID *</label>
                        <input type="text" name="id" required placeholder="如: dev-001">
                    </div>
                    <div class="form-group">
                        <label>代理名称 *</label>
                        <input type="text" name="name" required placeholder="如: 开发助手">
                    </div>
                </div>
                <div class="form-group">
                    <label>角色</label>
                    <select name="role" onchange="onRoleChange(this.value)">
                        <option value="dev">开发代理</option>
                        <option value="writer">写作代理</option>
                        <option value="tester">测试代理</option>
                        <option value="ops">运维代理</option>
                        <option value="hr">人事代理</option>
                        <option value="pm">项目经理</option>
                        <option value="custom">自定义</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>性格</label>
                    <input type="text" name="personality" placeholder="如: 稳重、细致、善于沟通">
                </div>

                <!-- 性能 -->
                <div class="form-group">
                    <label>性能（初始值）</label>
                    <div class="performance-input">
                        <input type="number" name="initial_tokens" placeholder="初始Token配额" value="10000">
                        <input type="number" name="max_concurrent_tasks" placeholder="最大并发任务数" value="1">
                    </div>
                </div>

                <!-- 工作职责 -->
                <div class="form-group">
                    <label>工作职责（选择或输入）</label>
                    <div class="option-tags" id="duties-options">
                        <!-- 由 JS 动态生成 -->
                    </div>
                    <input type="text" name="duties" placeholder="自定义工作职责，用逗号分隔">
                </div>

                <!-- 技能 -->
                <div class="form-group">
                    <label>技能（选择或输入）</label>
                    <div class="option-cards" id="skills-options">
                        <!-- 由 JS 动态生成 -->
                    </div>
                    <input type="text" name="skills" placeholder="自定义技能，用逗号分隔">
                </div>

                <!-- 工作区 -->
                <div class="form-group">
                    <label>工作区路径</label>
                    <div class="workspace-input">
                        <span class="workspace-prefix">~/agents/</span>
                        <input type="text" name="workspace" id="workspace-path" placeholder="代理ID">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
